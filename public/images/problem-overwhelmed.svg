<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2744;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Desk -->
  <rect x="50" y="250" width="500" height="120" fill="#2a3a52" rx="8"/>
  
  <!-- Papers/Reports scattered -->
  <g transform="rotate(-15, 100, 200)">
    <rect x="80" y="180" width="100" height="70" fill="#3a4a62" rx="4"/>
    <line x1="90" y1="200" x2="170" y2="200" stroke="#5a6a82" stroke-width="2"/>
    <line x1="90" y1="210" x2="170" y2="210" stroke="#5a6a82" stroke-width="2"/>
    <line x1="90" y1="220" x2="150" y2="220" stroke="#5a6a82" stroke-width="2"/>
    <text x="100" y="195" fill="#ff6b6b" font-size="8" font-family="Arial">URGENTE</text>
  </g>
  
  <g transform="rotate(10, 200, 220)">
    <rect x="180" y="200" width="90" height="60" fill="#3a4a62" rx="4"/>
    <line x1="190" y1="215" x2="260" y2="215" stroke="#5a6a82" stroke-width="2"/>
    <line x1="190" y1="225" x2="260" y2="225" stroke="#5a6a82" stroke-width="2"/>
    <text x="195" y="212" fill="#ffd93d" font-size="7" font-family="Arial">FALTA LEITO</text>
  </g>
  
  <g transform="rotate(-8, 350, 190)">
    <rect x="330" y="170" width="110" height="75" fill="#3a4a62" rx="4"/>
    <line x1="340" y1="190" x2="430" y2="190" stroke="#5a6a82" stroke-width="2"/>
    <line x1="340" y1="200" x2="430" y2="200" stroke="#5a6a82" stroke-width="2"/>
    <line x1="340" y1="210" x2="400" y2="210" stroke="#5a6a82" stroke-width="2"/>
    <text x="345" y="185" fill="#6bcf7f" font-size="8" font-family="Arial">SURTO DETECTADO</text>
  </g>
  
  <!-- Computer screen -->
  <rect x="220" y="140" width="140" height="100" fill="#1a2332" rx="8" stroke="#00d9ff" stroke-width="2"/>
  <rect x="230" y="150" width="120" height="70" fill="#0a1628"/>
  <line x1="240" y1="165" x2="340" y2="165" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="175" x2="320" y2="175" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="185" x2="340" y2="185" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="195" x2="300" y2="195" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Person silhouette (stressed) -->
  <g transform="translate(280, 60)">
    <!-- Head -->
    <circle cx="20" cy="25" r="20" fill="#4a5568"/>
    <!-- Body -->
    <path d="M 0 50 Q 20 45 40 50 L 40 100 L 0 100 Z" fill="#4a5568"/>
    <!-- Arms holding head -->
    <path d="M -10 60 Q 5 50 15 40" stroke="#4a5568" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 50 60 Q 35 50 25 40" stroke="#4a5568" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Stress lines -->
    <line x1="10" y1="15" x2="5" y2="5" stroke="#ff6b6b" stroke-width="2"/>
    <line x1="20" y1="12" x2="20" y2="0" stroke="#ff6b6b" stroke-width="2"/>
    <line x1="30" y1="15" x2="35" y2="5" stroke="#ff6b6b" stroke-width="2"/>
  </g>
  
  <!-- Clock showing late hour -->
  <circle cx="520" cy="100" r="35" fill="#2a3a52" stroke="#ffd93d" stroke-width="3"/>
  <line x1="520" y1="100" x2="520" y2="75" stroke="#ffd93d" stroke-width="3" stroke-linecap="round"/>
  <line x1="520" y1="100" x2="540" y2="100" stroke="#ffd93d" stroke-width="2" stroke-linecap="round"/>
  <circle cx="520" cy="100" r="3" fill="#ffd93d"/>
  
  <!-- Coffee cups -->
  <rect x="450" y="280" width="20" height="25" fill="#8b4513" rx="2"/>
  <rect x="455" y="275" width="10" height="5" fill="#654321" rx="1"/>
  <path d="M 470 285 Q 478 290 470 295" stroke="#8b4513" stroke-width="2" fill="none"/>
  
  <rect x="480" y="290" width="18" height="22" fill="#6b3508" rx="2"/>
  <rect x="484" y="286" width="10" height="4" fill="#654321" rx="1"/>
  
  <!-- More scattered papers -->
  <g transform="rotate(25, 480, 240)">
    <rect x="460" y="220" width="70" height="50" fill="#3a4a62" rx="3"/>
    <text x="470" y="240" fill="#ff6b6b" font-size="7" font-family="Arial">REUNIÃO</text>
    <text x="470" y="250" fill="#fff" font-size="6" font-family="Arial">08:00</text>
  </g>
  
  <!-- Notification badges -->
  <circle cx="170" cy="160" r="15" fill="#ff6b6b" filter="url(#glow)"/>
  <text x="165" y="165" fill="#fff" font-size="12" font-weight="bold" font-family="Arial">!</text>
  
  <circle cx="420" cy="280" r="12" fill="#ffd93d" filter="url(#glow)"/>
  <text x="416" y="285" fill="#000" font-size="10" font-weight="bold" font-family="Arial">3</text>
  
  <!-- Newspaper headlines -->
  <g transform="rotate(-5, 120, 300)">
    <rect x="90" y="280" width="100" height="50" fill="#e0e0e0" rx="2"/>
    <rect x="95" y="285" width="90" height="8" fill="#333"/>
    <rect x="95" y="296" width="60" height="4" fill="#666"/>
    <rect x="95" y="303" width="70" height="4" fill="#666"/>
    <rect x="95" y="310" width="50" height="4" fill="#666"/>
  </g>
  
  <!-- Title overlay -->
  <text x="300" y="360" text-anchor="middle" fill="#00d9ff" font-size="16" font-family="Arial" font-weight="bold" filter="url(#glow)">
    Muita informação. Pouco tempo.
  </text>
</svg>